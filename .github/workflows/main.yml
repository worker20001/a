name: Run SHYAM Workflow

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run_SHYAM_workflow:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install required packages
        run: |
          pip install pymongo python-telegram-bot pyTelegramBotAPI certifi PyGithub

      - name: Make soul executable
        run: chmod +x soul

      - name: Run soul.py
        run: python3 soul.py
